<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost | Avrah</title>
  <link rel="icon" type="image/svg+xml" href="/brand/assets/favicon.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #e5e5e5;
      --text-muted: #888;
      --accent: #c9a55a;
      --accent-dim: rgba(201, 165, 90, 0.12);
      --sage: #7a9e7e;
      --copper: #b87333;
      --dusk: #8b7ec8;
      --amber: #d4865a;
      --sky: #6b9ec4;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .scene-container {
      width: 100%;
      max-width: 480px;
      margin-bottom: 40px;
    }

    .scene-container svg {
      width: 100%;
      height: auto;
    }

    .content {
      text-align: center;
      max-width: 420px;
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .back-link {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      font-size: 15px;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 0.85; }

    .footer-note {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.5;
      font-family: var(--font-mono);
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.2; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.15; }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    @keyframes signal-fade {
      0% { opacity: 0.5; stroke-dashoffset: 0; }
      100% { opacity: 0; stroke-dashoffset: 12; }
    }

    .float { animation: float 4s ease-in-out infinite; }
    .blink-led { animation: blink 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse 2s ease-in-out infinite; }

    .twinkle-1 { animation: twinkle 3s ease-in-out infinite; }
    .twinkle-2 { animation: twinkle 4s ease-in-out 1s infinite; }
    .twinkle-3 { animation: twinkle 3.5s ease-in-out 0.5s infinite; }
    .twinkle-4 { animation: twinkle 5s ease-in-out 2s infinite; }
    .twinkle-5 { animation: twinkle 2.5s ease-in-out 1.5s infinite; }

    .signal-wave {
      animation: signal-fade 2s ease-out infinite;
    }
    .signal-wave-2 {
      animation: signal-fade 2s ease-out 0.4s infinite;
    }
    .signal-wave-3 {
      animation: signal-fade 2s ease-out 0.8s infinite;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="scene-container">
    <svg viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Illustration: a small device on a floating circuit board, searching for a signal among the stars">

      <!-- ============================================ -->
      <!-- BACKGROUND: Stars, sparks, and ambient dots  -->
      <!-- ============================================ -->

      <!-- Stars (small circles) -->
      <circle cx="48" cy="32" r="1.5" fill="#c9a55a" class="twinkle-1"/>
      <circle cx="432" cy="24" r="1" fill="#c9a55a" class="twinkle-2"/>
      <circle cx="88" cy="88" r="1" fill="#c9a55a" class="twinkle-3"/>
      <circle cx="400" cy="100" r="1.5" fill="#c9a55a" class="twinkle-4"/>
      <circle cx="156" cy="20" r="0.8" fill="#c9a55a" class="twinkle-5"/>
      <circle cx="340" cy="52" r="1.2" fill="#c9a55a" class="twinkle-1"/>
      <circle cx="60" cy="180" r="0.8" fill="#c9a55a" class="twinkle-4"/>
      <circle cx="420" cy="200" r="1" fill="#c9a55a" class="twinkle-2"/>
      <circle cx="24" cy="260" r="1" fill="#c9a55a" class="twinkle-3"/>
      <circle cx="460" cy="280" r="0.8" fill="#c9a55a" class="twinkle-5"/>
      <circle cx="200" cy="60" r="1" fill="#888" class="twinkle-2"/>
      <circle cx="320" cy="280" r="0.8" fill="#888" class="twinkle-4"/>
      <circle cx="100" cy="290" r="1.2" fill="#888" class="twinkle-1"/>

      <!-- Spark motifs (four-pointed stars) -->
      <g class="twinkle-3" opacity="0.5">
        <path d="M72 140L73.5 143.5L77 145L73.5 146.5L72 150L70.5 146.5L67 145L70.5 143.5Z" fill="#c9a55a"/>
      </g>
      <g class="twinkle-1" opacity="0.4">
        <path d="M408 160L409.5 163L413 164.5L409.5 166L408 169L406.5 166L403 164.5L406.5 163Z" fill="#c9a55a"/>
      </g>
      <g class="twinkle-5" opacity="0.35">
        <path d="M360 40L361 42.5L363.5 43.5L361 44.5L360 47L359 44.5L356.5 43.5L359 42.5Z" fill="#c9a55a"/>
      </g>

      <!-- ============================================ -->
      <!-- FLOATING ISLAND: Circuit board platform      -->
      <!-- ============================================ -->

      <g class="float">
        <!-- Board shadow -->
        <ellipse cx="240" cy="250" rx="110" ry="14" fill="#0a0a0a" opacity="0.4"/>

        <!-- PCB base -->
        <rect x="128" y="188" width="224" height="56" rx="8" fill="#7a9e7e" opacity="0.85"/>

        <!-- PCB edge highlight -->
        <rect x="128" y="188" width="224" height="3" rx="2" fill="#8db89a" opacity="0.4"/>

        <!-- Copper traces -->
        <!-- Left trace cluster -->
        <line x1="148" y1="204" x2="196" y2="204" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
        <line x1="196" y1="204" x2="196" y2="224" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
        <line x1="148" y1="214" x2="172" y2="214" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="172" y1="214" x2="172" y2="230" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Right trace cluster — BROKEN! (the 404 concept) -->
        <line x1="280" y1="208" x2="310" y2="208" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
        <!-- Gap in trace — the broken connection -->
        <line x1="320" y1="208" x2="340" y2="208" stroke="#b87333" stroke-width="2" stroke-linecap="round" opacity="0.2" stroke-dasharray="4 3"/>
        <line x1="300" y1="220" x2="336" y2="220" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Center traces (connecting to device) -->
        <line x1="220" y1="188" x2="220" y2="200" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
        <line x1="260" y1="188" x2="260" y2="200" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
        <line x1="240" y1="188" x2="240" y2="196" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Via holes -->
        <circle cx="184" cy="228" r="4" fill="none" stroke="#b87333" stroke-width="1.5" opacity="0.7"/>
        <circle cx="184" cy="228" r="1.5" fill="#b87333" opacity="0.5"/>
        <circle cx="316" cy="228" r="4" fill="none" stroke="#b87333" stroke-width="1.5" opacity="0.7"/>
        <circle cx="316" cy="228" r="1.5" fill="#b87333" opacity="0.5"/>
        <circle cx="152" cy="232" r="3" fill="none" stroke="#b87333" stroke-width="1.2" opacity="0.5"/>

        <!-- SMD components -->
        <rect x="156" y="222" width="10" height="5" rx="1" fill="#d4865a" opacity="0.8"/>
        <rect x="290" y="215" width="6" height="6" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
        <rect x="330" y="226" width="12" height="5" rx="1" fill="#d4865a" opacity="0.7"/>
        <rect x="204" y="230" width="8" height="4" rx="1" fill="#555"/>

        <!-- Chip/IC -->
        <rect x="250" y="218" width="18" height="14" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
        <line x1="252" y1="218" x2="252" y2="215" stroke="#888" stroke-width="1" stroke-linecap="round"/>
        <line x1="256" y1="218" x2="256" y2="215" stroke="#888" stroke-width="1" stroke-linecap="round"/>
        <line x1="260" y1="218" x2="260" y2="215" stroke="#888" stroke-width="1" stroke-linecap="round"/>
        <line x1="264" y1="218" x2="264" y2="215" stroke="#888" stroke-width="1" stroke-linecap="round"/>

        <!-- ============================================ -->
        <!-- THE DEVICE: Cute sensor character            -->
        <!-- ============================================ -->

        <!-- Device body -->
        <rect x="216" y="140" width="48" height="52" rx="8" fill="#141414" stroke="#333" stroke-width="2"/>

        <!-- Device body inner highlight -->
        <rect x="220" y="144" width="40" height="4" rx="2" fill="#1a1a1a"/>

        <!-- Eyes (LEDs) -->
        <!-- Left eye — active, blinking gold (searching) -->
        <circle cx="232" cy="163" r="6" fill="#c9a55a" class="blink-led"/>
        <circle cx="232" cy="163" r="10" fill="#c9a55a" opacity="0.08" class="pulse-glow"/>

        <!-- Right eye — dim, offline -->
        <circle cx="248" cy="163" r="6" fill="#333"/>
        <circle cx="248" cy="163" r="4" fill="#555" opacity="0.3"/>

        <!-- Mouth — small concerned dash -->
        <line x1="234" y1="177" x2="246" y2="177" stroke="#555" stroke-width="2" stroke-linecap="round"/>

        <!-- Antenna -->
        <line x1="240" y1="140" x2="240" y2="116" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="240" cy="112" r="4" fill="#888"/>
        <circle cx="240" cy="112" r="2" fill="#c9a55a" class="blink-led"/>

        <!-- Signal waves (searching, fading) -->
        <path d="M252 108C258 100 264 102 268 96" fill="none" stroke="#c9a55a" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3" class="signal-wave"/>
        <path d="M256 112C264 102 272 106 278 98" fill="none" stroke="#c9a55a" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 4" class="signal-wave-2"/>
        <path d="M258 118C268 108 278 112 286 102" fill="none" stroke="#c9a55a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 5" class="signal-wave-3"/>

        <!-- Question mark -->
        <text x="292" y="100" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#c9a55a" opacity="0.5" class="pulse-glow">?</text>

        <!-- Spark near the broken trace (something went wrong here) -->
        <g opacity="0.6">
          <path d="M315 208L316.5 211L320 212.5L316.5 214L315 217L313.5 214L310 212.5L313.5 211Z" fill="#c9a55a" class="twinkle-2"/>
        </g>

        <!-- Device feet / board connectors -->
        <rect x="224" y="190" width="4" height="4" rx="1" fill="#888"/>
        <rect x="252" y="190" width="4" height="4" rx="1" fill="#888"/>
      </g>

    </svg>
  </div>

  <div class="content">
    <p class="error-code">Error 404</p>
    <h1>Signal Lost</h1>
    <p class="subtitle">The page you're looking for has gone off the grid. Our little sensor checked everywhere.</p>
    <a href="/" class="back-link">Back to base</a>
  </div>

  <p class="footer-note">avrah.studio</p>

</body>
</html>
